# Daily scrape → chunk → embed. Cron is UTC (03:45 ≈ 09:15 IST).
# Configure repository secrets: GEMINI_API_KEY, and either QDRANT_URL + QDRANT_API_KEY
# or QDRANT_HOST / QDRANT_PORT (and QDRANT_API_KEY if required).

name: Daily corpus ingest

on:
  schedule:
    - cron: "45 3 * * *"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape sources
        env:
          SCRAPE_DELAY_SECONDS: "2"
        run: python phase-1-data-collection/scrape_sources.py

      - name: Process documents (chunk)
        run: python phase-2-document-processing/process_documents.py

      - name: Generate embeddings and upsert Qdrant
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_HOST: ${{ secrets.QDRANT_HOST }}
          QDRANT_PORT: ${{ secrets.QDRANT_PORT }}
        run: python phase-2-document-processing/generate_embeddings.py
